name: Android build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-provider: basic

      - name: Run unit tests and build debug APK
        run: gradle --no-daemon testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: HealthConnectBridge-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: HealthConnectBridge-test-report-${{ github.run_number }}
          path: app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7
